<!DOCTYPE html>
<html>
<head>
    <title>AI Chat App</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
        }

        .chat-container {
            width: 400px;
            background: white;
            padding: 15px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .chat-box {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
        }

        .user {
            text-align: right;
            color: blue;
            margin: 5px;
        }

        .bot {
            text-align: left;
            color: green;
            margin: 5px;
        }

        input {
            width: 75%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <h2>🤖 AI Chat</h2>

    <div class="chat-box">
        {% if user_input %}
            <div class="user">{{ user_input }}</div>
        {% endif %}

        {% if response %}
            <div class="bot">{{ response }}</div>
        {% endif %}
    </div>

    <form method="POST">
        <input type="text" name="message" placeholder="Type your message..." required>
        <button type="submit">Send</button>
    </form>
</div>

</body>
</html>
